# Local infrastructure only (Postgres + MinIO).
# Email uses Resend (external API) — no mail container. See .env.example.
#
# Start:  docker compose up -d
# Stop:   docker compose down
#
# Local credentials below are for development only — not for production.

services:
  postgres:
    image: postgres:16-alpine
    container_name: alma-postgres
    environment:
      POSTGRES_USER: alma
      POSTGRES_PASSWORD: alma
      POSTGRES_DB: alma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alma -d alma"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: alma-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      # minio server image has curl; `mc` lives in minio/mc only
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Creates the default lead-files bucket once MinIO is up.
  minio-init:
    image: minio/mc:latest
    container_name: alma-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...';
        sleep 1;
      done;
      mc mb --ignore-existing local/lead-files;
      echo 'bucket lead-files ready';
      "

volumes:
  postgres_data:
  minio_data:
